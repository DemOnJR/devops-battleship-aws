# ═══════════════════════════════════════════════════════════════
# CI/CD Pipeline - Build & Push to Docker Hub
# ═══════════════════════════════════════════════════════════════
# Triggered on push to main branch.
#
# Flow:
#   1. Build Docker image from app/ directory
#   2. Push to Docker Hub as pbdaemon/battleship:latest + :sha-xxxxx
#   3. Watchtower on EC2 auto-detects the new image and rolling-restarts
#
# No SSH needed! No public IP needed! Watchtower pulls new images automatically.
#
# Required GitHub Secrets (set in repo Settings > Secrets):
#   DOCKERHUB_USERNAME  - pbdaemon
#   DOCKERHUB_TOKEN     - Docker Hub access token (not password)

name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'docker-compose.yml'
      - 'nginx/**'
      - '.github/workflows/**'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            pbdaemon/battleship:latest
            pbdaemon/battleship:sha-${{ github.sha }}
