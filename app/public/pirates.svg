<svg xmlns="http://www.w3.org/2000/svg" style="display:none">
  <!-- Captain Jack Sparrow -->
  <symbol id="jack-sparrow" viewBox="0 0 120 200">
    <!-- Boots -->
    <rect x="30" y="175" width="22" height="25" rx="4" fill="#3d2b1f"/>
    <rect x="68" y="175" width="22" height="25" rx="4" fill="#3d2b1f"/>
    <rect x="28" y="192" width="26" height="8" rx="3" fill="#2a1a10"/>
    <rect x="66" y="192" width="26" height="8" rx="3" fill="#2a1a10"/>
    <!-- Legs -->
    <rect x="34" y="135" width="18" height="42" fill="#4a3520"/>
    <rect x="68" y="135" width="18" height="42" fill="#4a3520"/>
    <!-- Belt -->
    <rect x="28" y="128" width="64" height="10" rx="2" fill="#2a1a10"/>
    <rect x="55" y="126" width="14" height="14" rx="2" fill="#d4a843"/>
    <!-- Torso / Shirt -->
    <path d="M30 128 L30 80 Q60 70 90 80 L90 128 Z" fill="#f5e6d0"/>
    <!-- Vest -->
    <path d="M30 128 L30 85 L50 80 L50 128 Z" fill="#5c3a21"/>
    <path d="M70 80 L90 85 L90 128 L70 128 Z" fill="#5c3a21"/>
    <!-- V-neck opening -->
    <path d="M50 80 L60 105 L70 80" fill="none" stroke="#c9956b" stroke-width="1"/>
    <!-- Sash -->
    <path d="M28 120 Q60 115 92 120" fill="none" stroke="#c0392b" stroke-width="6"/>
    <!-- Neck -->
    <rect x="52" y="60" width="16" height="22" rx="4" fill="#c9956b"/>
    <!-- Head -->
    <ellipse cx="60" cy="48" rx="22" ry="24" fill="#c9956b"/>
    <!-- Bandana -->
    <path d="M38 42 Q60 28 82 42 L80 38 Q60 25 40 38 Z" fill="#c0392b"/>
    <path d="M38 42 Q60 32 82 42" fill="none" stroke="#8b0000" stroke-width="1"/>
    <!-- Bandana tails -->
    <path d="M82 40 Q88 50 92 62" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M82 40 Q90 48 96 55" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Hair / Dreads -->
    <path d="M38 45 Q32 60 28 85" stroke="#1a0f0a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M40 48 Q35 65 33 82" stroke="#1a0f0a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M82 45 Q88 60 92 85" stroke="#1a0f0a" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M80 48 Q85 65 87 82" stroke="#1a0f0a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Beads in hair -->
    <circle cx="30" cy="70" r="3" fill="#d4a843"/>
    <circle cx="35" cy="75" r="2" fill="#3498db"/>
    <circle cx="90" cy="70" r="3" fill="#d4a843"/>
    <!-- Eyes -->
    <ellipse cx="52" cy="47" rx="4" ry="4.5" fill="white"/>
    <ellipse cx="68" cy="47" rx="4" ry="4.5" fill="white"/>
    <circle cx="53" cy="47" r="2.5" fill="#1a0f0a"/>
    <circle cx="69" cy="47" r="2.5" fill="#1a0f0a"/>
    <circle cx="54" cy="46" r="1" fill="white"/>
    <circle cx="70" cy="46" r="1" fill="white"/>
    <!-- Eyeliner / Kohl -->
    <path d="M47 45 Q52 43 57 45" fill="none" stroke="#1a0f0a" stroke-width="1.5"/>
    <path d="M63 45 Q68 43 73 45" fill="none" stroke="#1a0f0a" stroke-width="1.5"/>
    <!-- Eyebrows -->
    <path d="M48 41 Q52 38 57 40" fill="none" stroke="#1a0f0a" stroke-width="1.5"/>
    <path d="M63 40 Q68 38 72 41" fill="none" stroke="#1a0f0a" stroke-width="1.5"/>
    <!-- Nose -->
    <path d="M60 48 Q58 54 60 56 Q62 54 60 48" fill="#b8865a"/>
    <!-- Mustache -->
    <path d="M50 58 Q55 62 60 59 Q65 62 70 58" fill="#1a0f0a"/>
    <!-- Goatee -->
    <path d="M55 62 Q60 72 65 62" fill="#1a0f0a"/>
    <path d="M57 66 Q60 76 63 66" fill="#1a0f0a"/>
    <!-- Smirk -->
    <path d="M52 58 Q60 64 68 58" fill="none" stroke="#8b5e3c" stroke-width="1"/>
    <!-- Left arm -->
    <path d="M30 85 Q15 100 12 125" stroke="#c9956b" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Sword in left hand -->
    <line x1="12" y1="125" x2="5" y2="75" stroke="#c0c0c0" stroke-width="3"/>
    <line x1="8" y1="122" x2="16" y2="128" stroke="#d4a843" stroke-width="4"/>
    <!-- Right arm -->
    <path d="M90 85 Q105 95 108 110" stroke="#c9956b" stroke-width="12" fill="none" stroke-linecap="round"/>
    <!-- Right hand -->
    <circle cx="108" cy="112" r="6" fill="#c9956b"/>
    <!-- Compass in right hand -->
    <circle cx="108" cy="112" r="8" fill="#5c3a21" stroke="#d4a843" stroke-width="1.5"/>
    <circle cx="108" cy="112" r="5" fill="#f5e6d0"/>
    <line x1="108" y1="108" x2="110" y2="114" stroke="#c0392b" stroke-width="1.5"/>
  </symbol>

  <!-- Parrot -->
  <symbol id="parrot" viewBox="0 0 80 80">
    <!-- Tail feathers -->
    <path d="M55 55 Q65 70 55 78" stroke="#c0392b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M52 55 Q60 72 48 80" stroke="#e74c3c" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M50 56 Q55 68 42 76" stroke="#f39c12" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="40" cy="42" rx="16" ry="20" fill="#27ae60"/>
    <!-- Belly -->
    <ellipse cx="40" cy="48" rx="10" ry="12" fill="#2ecc71"/>
    <!-- Wing -->
    <path d="M52 35 Q65 38 68 50 Q60 48 52 45 Z" fill="#1e8449"/>
    <path d="M55 38 Q62 40 64 46" fill="none" stroke="#27ae60" stroke-width="1"/>
    <!-- Wing feather tips -->
    <path d="M65 45 Q70 48 72 55" stroke="#1a5e2f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M67 47 Q73 50 74 58" stroke="#1a5e2f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="35" cy="22" r="13" fill="#27ae60"/>
    <!-- Eye ring -->
    <circle cx="30" cy="20" r="6" fill="white"/>
    <!-- Eye -->
    <circle cx="30" cy="20" r="3" fill="#1a0f0a"/>
    <circle cx="31" cy="19" r="1" fill="white"/>
    <!-- Beak -->
    <path d="M22 22 L15 25 L22 27 Z" fill="#2c3e50"/>
    <path d="M22 24 L16 25" stroke="#1a252f" stroke-width="0.5"/>
    <!-- Beak curve (hooked) -->
    <path d="M15 25 Q13 23 15 22" fill="#2c3e50"/>
    <!-- Head feathers / crest -->
    <path d="M40 12 Q45 5 42 2" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M38 13 Q42 4 38 0" stroke="#e74c3c" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M36 14 Q38 6 34 2" stroke="#f1c40f" stroke-width="2" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <path d="M35 60 L30 68 M30 68 L26 66 M30 68 L28 71 M30 68 L33 70" stroke="#f39c12" stroke-width="2" fill="none"/>
    <path d="M45 60 L42 68 M42 68 L38 66 M42 68 L40 71 M42 68 L45 70" stroke="#f39c12" stroke-width="2" fill="none"/>
  </symbol>

  <!-- Monkey -->
  <symbol id="monkey" viewBox="0 0 90 100">
    <!-- Tail (curly) -->
    <path d="M70 65 Q85 55 80 40 Q75 30 82 20 Q88 12 85 8" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Body -->
    <ellipse cx="45" cy="60" rx="18" ry="22" fill="#8B4513"/>
    <!-- Belly -->
    <ellipse cx="45" cy="63" rx="12" ry="15" fill="#D2A679"/>
    <!-- Left arm -->
    <path d="M28 50 Q12 55 8 68" stroke="#8B4513" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Left hand -->
    <circle cx="8" cy="70" r="5" fill="#D2A679"/>
    <!-- Banana in hand -->
    <path d="M4 65 Q0 58 5 52 Q8 56 6 62" fill="#f1c40f" stroke="#d4a843" stroke-width="0.5"/>
    <!-- Right arm -->
    <path d="M62 50 Q75 48 80 55" stroke="#8B4513" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Right hand -->
    <circle cx="82" cy="57" r="5" fill="#D2A679"/>
    <!-- Legs -->
    <path d="M35 78 Q30 90 25 95" stroke="#8B4513" stroke-width="7" fill="none" stroke-linecap="round"/>
    <path d="M55 78 Q58 90 62 95" stroke="#8B4513" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Feet -->
    <ellipse cx="23" cy="96" rx="7" ry="4" fill="#D2A679"/>
    <ellipse cx="64" cy="96" rx="7" ry="4" fill="#D2A679"/>
    <!-- Head -->
    <circle cx="45" cy="30" r="18" fill="#8B4513"/>
    <!-- Face -->
    <ellipse cx="45" cy="34" rx="13" ry="12" fill="#D2A679"/>
    <!-- Ears -->
    <circle cx="24" cy="28" r="8" fill="#8B4513"/>
    <circle cx="24" cy="28" r="5" fill="#D2A679"/>
    <circle cx="66" cy="28" r="8" fill="#8B4513"/>
    <circle cx="66" cy="28" r="5" fill="#D2A679"/>
    <!-- Eyes -->
    <ellipse cx="39" cy="30" rx="3.5" ry="4" fill="white"/>
    <ellipse cx="51" cy="30" rx="3.5" ry="4" fill="white"/>
    <circle cx="40" cy="31" r="2.5" fill="#1a0f0a"/>
    <circle cx="52" cy="31" r="2.5" fill="#1a0f0a"/>
    <circle cx="41" cy="30" r="1" fill="white"/>
    <circle cx="53" cy="30" r="1" fill="white"/>
    <!-- Nose -->
    <ellipse cx="45" cy="36" rx="4" ry="2.5" fill="#6d3a1f"/>
    <circle cx="43" cy="36" r="1" fill="#4a2510"/>
    <circle cx="47" cy="36" r="1" fill="#4a2510"/>
    <!-- Mouth (cheeky grin) -->
    <path d="M39 40 Q45 46 51 40" fill="none" stroke="#4a2510" stroke-width="1.5"/>
    <!-- Pirate bandana on monkey -->
    <path d="M27 22 Q45 14 63 22" fill="#c0392b"/>
    <path d="M27 22 Q45 17 63 22" fill="none" stroke="#8b0000" stroke-width="0.5"/>
    <path d="M63 22 Q68 28 70 35" stroke="#c0392b" stroke-width="3" fill="none" stroke-linecap="round"/>
  </symbol>
</svg>
