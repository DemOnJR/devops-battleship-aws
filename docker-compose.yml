# Docker Compose for production (runs on EC2)
# Image is pulled from Docker Hub - built by GitHub Actions CI/CD
services:

  # ─── REDIS (shared game state) ────────────────────────────
  # Master-Replica with Sentinel failover
  # If master dies, Sentinel promotes replica to master automatically
  redis-master:
    image: redis:7-alpine
    command: redis-server --appendonly yes --save 60 1 --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-master-data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - battleship-net

  redis-replica:
    image: redis:7-alpine
    command: redis-server --appendonly yes --replicaof redis-master 6379 --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-replica-data:/data
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    networks:
      - battleship-net

  # Sentinels monitor Redis master and handle automatic failover
  # Need 3 for quorum (2 out of 3 must agree master is down)
  sentinel-1:
    image: redis:7-alpine
    command: >
      sh -c "echo 'port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - battleship-net

  sentinel-2:
    image: redis:7-alpine
    command: >
      sh -c "echo 'port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - battleship-net

  sentinel-3:
    image: redis:7-alpine
    command: >
      sh -c "echo 'port 26379
      sentinel monitor mymaster redis-master 6379 2
      sentinel down-after-milliseconds mymaster 5000
      sentinel failover-timeout mymaster 10000
      sentinel parallel-syncs mymaster 1' > /tmp/sentinel.conf && redis-sentinel /tmp/sentinel.conf"
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    networks:
      - battleship-net

  # ─── APP SERVERS ──────────────────────────────────────────
  app-1:
    image: pbdaemon/battleship:latest
    environment:
      - PORT=3000
      - INSTANCE_ID=app-1
      - REDIS_SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=mymaster
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
      sentinel-1:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - battleship-net

  app-2:
    image: pbdaemon/battleship:latest
    environment:
      - PORT=3000
      - INSTANCE_ID=app-2
      - REDIS_SENTINEL_HOSTS=sentinel-1:26379,sentinel-2:26379,sentinel-3:26379
      - REDIS_MASTER_NAME=mymaster
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
      sentinel-1:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - battleship-net

  # ─── NGINX ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app-1:
        condition: service_healthy
      app-2:
        condition: service_healthy
    restart: always
    networks:
      - battleship-net

  # ─── CLOUDFLARE TUNNEL ────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${CF_TUNNEL_TOKEN}
    restart: always
    depends_on:
      - nginx
    networks:
      - battleship-net

  # ─── WATCHTOWER (auto-deploy) ─────────────────────────────
  # Polls Docker Hub every 30s, rolling restarts on new images
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=30
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_INCLUDE_STOPPED=false
    restart: always
    networks:
      - battleship-net

volumes:
  redis-master-data:
  redis-replica-data:

networks:
  battleship-net:
    driver: bridge
